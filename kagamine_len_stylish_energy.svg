    <!-- Left side of open jacket -->
    <path d="M190 270 L178 300 L170 350 L168 400 L170 440 L175 470 L200 470 L200 440 L205 380 L210 320 L215 280 L210 270 Z" fill="url(#hoodieGrad)" stroke="#0A0A0A" stroke-width="1"/>
    <!-- Right side of open jacket -->
    <path d="M305 270 L318 300 L325 350 L327 400 L325 440 L320 470 L295 470 L295 440 L290 380 L285 320 L280 280 L285 270 Z" fill="url(#hoodieGrad)" stroke="#0A0A0A" stroke-width="1"/>

    <!-- Jacket collar left -->
    <path d="M210 270 L220 260 L225 278 L215 285 L205 290 L190 270 Z" fill="#2A2A2A" stroke="#0A0A0A" stroke-width="0.8"/>
    <!-- Jacket collar right -->
    <path d="M285 270 L275 260 L270 278 L280 285 L290 290 L305 270 Z" fill="#2A2A2A" stroke="#0A0A0A" stroke-width="0.8"/>

    <!-- Yellow accent stripes on jacket - left -->
    <path d="M175 310 L170 350 L173 350 L178 310 Z" fill="#FFD700"/>
    <path d="M170 360 L168 400 L171 400 L173 360 Z" fill="#FFD700"/>
    <!-- Yellow accent stripes on jacket - right -->
    <path d="M320 310 L325 350 L322 350 L317 310 Z" fill="#FFD700"/>
    <path d="M325 360 L327 400 L324 400 L322 360 Z" fill="#FFD700"/>

    <!-- Jacket pocket left -->
    <path d="M178 410 L195 410 L195 445 L178 445 Z" fill="#222222" stroke="#FFD700" stroke-width="1" rx="2"/>
    <!-- Jacket pocket right -->
    <path d="M300 410 L317 410 L317 445 L300 445 Z" fill="#222222" stroke="#FFD700" stroke-width="1" rx="2"/>

