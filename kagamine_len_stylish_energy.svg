    <!-- Left shoe -->
    <path d="M195 680 L192 700 L188 720 L190 730 L240 730 L242 720 L240 700 L237 680 Z" fill="url(#shoeGrad)" stroke="#AA8800" stroke-width="1"/>
    <!-- Left shoe sole -->
    <path d="M188 725 L190 735 L242 735 L244 725 Z" fill="#1A1A1A" stroke="#0A0A0A" stroke-width="0.5"/>
    <!-- Left shoe accent stripe -->
    <path d="M196 700 L200 690 L210 690 L206 700 Z" fill="#1A1A1A"/>
    <!-- Left shoe lace area -->
    <path d="M208 685 L218 685 L218 705 L208 705 Z" fill="#1A1A1A" opacity="0.6" rx="2"/>

    <!-- Right shoe -->
    <path d="M255 680 L252 700 L248 720 L250 730 L300 730 L302 720 L300 700 L297 680 Z" fill="url(#shoeGrad)" stroke="#AA8800" stroke-width="1"/>
    <!-- Right shoe sole -->
    <path d="M248 725 L250 735 L302 735 L304 725 Z" fill="#1A1A1A" stroke="#0A0A0A" stroke-width="0.5"/>
    <!-- Right shoe accent stripe -->
    <path d="M256 700 L260 690 L270 690 L266 700 Z" fill="#1A1A1A"/>
    <!-- Right shoe lace area -->
    <path d="M268 685 L278 685 L278 705 L268 705 Z" fill="#1A1A1A" opacity="0.6" rx="2"/>

    <!-- ==================== SHORTS (yellow) ==================== -->
    <path d="M200 460 L195 480 L198 520 L207 548 L240 550 L250 548 L260 550 L293 548 L298 520 L300 480 L295 460 Z" fill="url(#shortsGrad)" stroke="#CCAA00" stroke-width="1"/>
    <!-- Shorts center split -->
    <path d="M248 480 L247 548" stroke="#CCAA00" stroke-width="1.5" fill="none"/>
    <!-- Shorts pocket lines -->
    <path d="M210 475 L218 490 L210 500" stroke="#CCAA00" stroke-width="1" fill="none"/>
    <path d="M285 475 L278 490 L285 500" stroke="#CCAA00" stroke-width="1" fill="none"/>
    <!-- Shorts waistband -->
    <path d="M200 460 L295 460 L297 468 L198 468 Z" fill="#1A1A1A" stroke="#0A0A0A" stroke-width="0.5"/>

    <!-- ==================== BODY / TORSO (inner shirt - white/light) ==================== -->
    <path d="M215 280 L210 320 L205 380 L200 440 L200 465 L295 465 L295 440 L290 380 L285 320 L280 280 Z" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.8"/>
    <!-- Inner shirt collar -->
    <path d="M225 278 L248 295 L270 278" stroke="#E0E0E0" stroke-width="1.5" fill="none"/>
    <!-- Tie/ribbon (yellow with black) -->
    <path d="M240 285 L248 295 L256 285 L252 285 L248 310 L244 285 Z" fill="#FFD700" stroke="#CCAA00" stroke-width="0.5"/>
    <path d="M245 295 L248 310 L251 295 Z" fill="#1A1A1A" opacity="0.3"/>
    <!-- Shirt seam lines -->
    <path d="M248 295 L248 460" stroke="#E8E8E8" stroke-width="0.8" fill="none" stroke-dasharray="4,4"/>

