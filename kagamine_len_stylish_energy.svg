<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 800" width="500" height="800">
  <defs>
    <!-- Gradients -->
    <linearGradient id="hairGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE44D"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#E6B800"/>
    </linearGradient>
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF0DC"/>
      <stop offset="100%" stop-color="#FFE0C0"/>
    </linearGradient>
    <linearGradient id="hoodieGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="shortsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#E6B800"/>
    </linearGradient>
    <linearGradient id="sockGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A3A"/>
      <stop offset="100%" stop-color="#0D0D2A"/>
    </linearGradient>
    <linearGradient id="shoeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#CCAA00"/>
    </linearGradient>
    <radialGradient id="eyeGrad" cx="0.4" cy="0.35">
      <stop offset="0%" stop-color="#5BD8E8"/>
      <stop offset="60%" stop-color="#2BA8CC"/>
      <stop offset="100%" stop-color="#1A7A9A"/>
    </radialGradient>
    <linearGradient id="headphoneGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#CCAA00"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#00000033"/>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000022"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="800" fill="#F5F0E8" rx="12"/>
  <!-- Subtle pattern dots -->
  <g opacity="0.06">
    <circle cx="50" cy="50" r="3" fill="#FFD700"/>
    <circle cx="100" cy="30" r="2" fill="#FFD700"/>
    <circle cx="150" cy="60" r="3" fill="#FFD700"/>
    <circle cx="400" cy="40" r="2" fill="#FFD700"/>
    <circle cx="450" cy="70" r="3" fill="#FFD700"/>
    <circle cx="350" cy="20" r="2" fill="#FFD700"/>
    <circle cx="80" cy="750" r="3" fill="#FFD700"/>
    <circle cx="420" cy="760" r="2" fill="#FFD700"/>
  </g>

  <g filter="url(#softShadow)">
    <!-- ==================== LEGS ==================== -->
    <!-- Left leg -->
    <path d="M215 540 L210 580 L208 640 L205 680 L230 680 L233 640 L235 580 L232 540 Z" fill="url(#skinGrad)" stroke="#DDBB99" stroke-width="0.5"/>
    <!-- Right leg -->
    <path d="M268 540 L265 580 L263 640 L260 680 L285 680 L288 640 L290 580 L285 540 Z" fill="url(#skinGrad)" stroke="#DDBB99" stroke-width="0.5"/>

    <!-- ==================== SOCKS (knee-high, dark navy) ==================== -->
    <!-- Left sock -->
    <path d="M206 560 L204 600 L203 650 L204 685 L232 685 L233 650 L234 600 L233 560 Z" fill="url(#sockGrad)" stroke="#0A0A20" stroke-width="0.8"/>
    <!-- Left sock top band -->
    <path d="M206 560 L233 560 L234 565 L205 565 Z" fill="#FFD700" stroke="#CCAA00" stroke-width="0.5"/>
    <!-- Right sock -->
    <path d="M266 560 L264 600 L263 650 L264 685 L292 685 L293 650 L294 600 L292 560 Z" fill="url(#sockGrad)" stroke="#0A0A20" stroke-width="0.8"/>
    <!-- Right sock top band -->
    <path d="M266 560 L292 560 L293 565 L265 565 Z" fill="#FFD700" stroke="#CCAA00" stroke-width="0.5"/>

