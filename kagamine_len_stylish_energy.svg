    <path d="M155 320 L145 348 L148 350 L158 322 Z" fill="#FFD700"/>
    <path d="M162 306 L155 320 L158 322 L165 308 Z" fill="#FFD700"/>

    <!-- Left forearm/hand -->
    <path d="M130 380 L125 410 L123 435 L128 440 L140 440 L143 435 L140 410 L138 385 Z" fill="url(#skinGrad)" stroke="#DDBB99" stroke-width="0.5"/>
    <!-- Left wristband -->
    <path d="M128 378 L140 378 L141 386 L127 386 Z" fill="#1A1A1A" stroke="#FFD700" stroke-width="0.8"/>

    <!-- Right arm - sleeve -->
    <path d="M305 275 L335 300 L355 340 L365 380 L357 385 L345 350 L327 312 L303 288 Z" fill="url(#hoodieGrad)" stroke="#0A0A0A" stroke-width="1"/>
