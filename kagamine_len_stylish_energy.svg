    <!-- Back hair -->
    <path d="M195 170 L190 200 L192 240 L200 260 L210 250 L205 230 L200 200 L205 175 Z" fill="#E6B800"/>
    <path d="M295 170 L300 200 L298 240 L290 260 L280 250 L285 230 L290 200 L285 175 Z" fill="#E6B800"/>

    <!-- Main hair mass -->
    <path d="M195 195 L190 160 L200 130 L215 115 L230 108 L248 105 L265 108 L280 115 L295 130 L305 160 L300 195 L295 175 L285 155 L270 142 L248 138 L225 142 L210 155 L200 175 Z" fill="url(#hairGrad)" stroke="#CCAA00" stroke-width="0.5"/>

    <!-- Hair spikes - top -->
    <path d="M230 108 L222 75 L235 100 Z" fill="url(#hairGrad)" stroke="#CCAA00" stroke-width="0.5"/>
    <path d="M248 105 L245 65 L255 68 L252 105 Z" fill="url(#hairGrad)" stroke="#CCAA00" stroke-width="0.5"/>
    <path d="M265 108 L275 78 L268 102 Z" fill="url(#hairGrad)" stroke="#CCAA00" stroke-width="0.5"/>
    <path d="M240 106 L232 82 L244 100 Z" fill="#FFE44D" stroke="#CCAA00" stroke-width="0.3"/>
    <path d="M256 106 L262 80 L254 100 Z" fill="#FFE44D" stroke="#CCAA00" stroke-width="0.3"/>

    <!-- Hair spikes - left side -->
    <path d="M195 195 L175 175 L185 155 L195 170 Z" fill="url(#hairGrad)" stroke="#CCAA00" stroke-width="0.5"/>
    <path d="M190 165 L170 148 L180 138 L195 155 Z" fill="url(#hairGrad)" stroke="#CCAA00" stroke-width="0.5"/>
    <path d="M200 150 L178 128 L192 130 L205 145 Z" fill="#FFE44D" stroke="#CCAA00" stroke-width="0.3"/>

    <!-- Hair spikes - right side -->
    <path d="M300 195 L320 175 L310 155 L300 170 Z" fill="url(#hairGrad)" stroke="#CCAA00" stroke-width="0.5"/>
    <path d="M305 165 L325 148 L315 138 L300 155 Z" fill="url(#hairGrad)" stroke="#CCAA00" stroke-width="0.5"/>
    <path d="M295 150 L318 128 L302 130 L290 145 Z" fill="#FFE44D" stroke="#CCAA00" stroke-width="0.3"/>

    <!-- Bangs -->
    <path d="M200 175 L210 180 L215 195 L205 200 L195 195 Z" fill="url(#hairGrad)" stroke="#CCAA00" stroke-width="0.3"/>
    <path d="M210 165 L225 175 L228 195 L218 200 L208 190 Z" fill="url(#hairGrad)" stroke="#CCAA00" stroke-width="0.3"/>
    <path d="M225 160 L240 165 L242 190 L232 195 L222 185 Z" fill="#FFE44D" stroke="#CCAA00" stroke-width="0.3"/>
    <path d="M240 158 L255 158 L258 185 L245 190 L238 180 Z" fill="url(#hairGrad)" stroke="#CCAA00" stroke-width="0.3"/>
    <path d="M255 160 L270 165 L272 190 L262 195 L253 185 Z" fill="#FFE44D" stroke="#CCAA00" stroke-width="0.3"/>
    <path d="M270 165 L282 175 L285 195 L278 200 L268 190 Z" fill="url(#hairGrad)" stroke="#CCAA00" stroke-width="0.3"/>
    <path d="M282 175 L295 180 L300 195 L292 200 L280 192 Z" fill="url(#hairGrad)" stroke="#CCAA00" stroke-width="0.3"/>

    <!-- Ponytail (small, on top-back) -->
    <path d="M240 105 L235 80 L230 55 L238 40 L252 38 L260 40 L265 55 L260 80 L255 105 Z" fill="url(#hairGrad)" stroke="#CCAA00" stroke-width="0.8"/>
    <!-- Ponytail tie -->
    <ellipse cx="248" cy="95" rx="12" ry="5" fill="#1A1A1A" stroke="#FFD700" stroke-width="1"/>

    <!-- Hair shine highlights -->
    <path d="M220 130 L235 125 L238 140 L222 142 Z" fill="#FFF5AA" opacity="0.4"/>
    <path d="M255 128 L270 132 L268 145 L253 140 Z" fill="#FFF5AA" opacity="0.4"/>

    <!-- ==================== FACE ==================== -->
    <!-- Eyes -->
    <!-- Left eye -->
    <ellipse cx="228" cy="200" rx="16" ry="18" fill="white" stroke="#333" stroke-width="1.2"/>
    <ellipse cx="230" cy="202" rx="12" ry="14" fill="url(#eyeGrad)"/>
    <ellipse cx="230" cy="205" rx="8" ry="10" fill="#1A7A9A"/>
    <circle cx="228" cy="196" r="5" fill="white" opacity="0.9"/>
    <circle cx="235" cy="205" r="2.5" fill="white" opacity="0.6"/>
    <ellipse cx="230" cy="202" rx="4" ry="5" fill="#0D4A5A"/>

    <!-- Right eye -->
    <ellipse cx="268" cy="200" rx="16" ry="18" fill="white" stroke="#333" stroke-width="1.2"/>
    <ellipse cx="266" cy="202" rx="12" ry="14" fill="url(#eyeGrad)"/>
    <ellipse cx="266" cy="205" rx="8" ry="10" fill="#1A7A9A"/>
    <circle cx="264" cy="196" r="5" fill="white" opacity="0.9"/>
    <circle cx="271" cy="205" r="2.5" fill="white" opacity="0.6"/>
    <ellipse cx="266" cy="202" rx="4" ry="5" fill="#0D4A5A"/>

    <!-- Eyebrows -->
    <path d="M212 183 L225 178 L240 181" stroke="#CC9900" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M283 183 L270 178 L256 181" stroke="#CC9900" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Eyelashes (top) -->
    <path d="M212 193 L215 190 L220 189" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M283 193 L280 190 L275 189" stroke="#333" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Nose (subtle) -->
    <path d="M247 218 L245 225 L248 227" stroke="#DDBB99" stroke-width="1.2" fill="none" stroke-linecap="round"/>

    <!-- Mouth (confident smile) -->
    <path d="M237 238 L243 242 L248 243 L253 242 L259 238" stroke="#CC7766" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M241 240 L248 244 L255 240" fill="#E88878" opacity="0.5"/>

    <!-- Blush -->
    <ellipse cx="218" cy="228" rx="10" ry="5" fill="#FFAAAA" opacity="0.2"/>
    <ellipse cx="278" cy="228" rx="10" ry="5" fill="#FFAAAA" opacity="0.2"/>

    <!-- ==================== HEADPHONES ==================== -->
    <!-- Headphone band -->
    <path d="M188 178 Q190 140 210 120 Q230 105 248 102 Q266 105 286 120 Q306 140 308 178" stroke="#333" stroke-width="4" fill="none"/>
    <path d="M188 178 Q190 142 210 122 Q230 107 248 104 Q266 107 286 122 Q306 142 308 178" stroke="#555" stroke-width="2" fill="none"/>

    <!-- Left ear cup -->
    <ellipse cx="186" cy="200" rx="15" ry="22" fill="url(#headphoneGrad)" stroke="#AA8800" stroke-width="1.5"/>
    <ellipse cx="186" cy="200" rx="10" ry="16" fill="#333" stroke="#555" stroke-width="0.5"/>
    <ellipse cx="186" cy="200" rx="6" ry="10" fill="#444"/>

    <!-- Right ear cup -->
    <ellipse cx="310" cy="200" rx="15" ry="22" fill="url(#headphoneGrad)" stroke="#AA8800" stroke-width="1.5"/>
    <ellipse cx="310" cy="200" rx="10" ry="16" fill="#333" stroke="#555" stroke-width="0.5"/>
    <ellipse cx="310" cy="200" rx="6" ry="10" fill="#444"/>

    <!-- ==================== HOODIE HOOD (behind head) ==================== -->
    <path d="M195 260 L185 250 L182 230 L185 210 L190 195 Q195 175 200 165 L210 270 Z" fill="#222" stroke="#0A0A0A" stroke-width="0.5" opacity="0.7"/>
    <path d="M300 260 L310 250 L313 230 L310 210 L305 195 Q300 175 295 165 L285 270 Z" fill="#222" stroke="#0A0A0A" stroke-width="0.5" opacity="0.7"/>

    <!-- ==================== "02" MARKING ==================== -->
    <text x="170" y="450" font-family="Arial Black, sans-serif" font-size="18" font-weight="bold" fill="#FFD700" opacity="0.8" transform="rotate(-5, 170, 450)">02</text>
    <text x="310" y="450" font-family="Arial Black, sans-serif" font-size="18" font-weight="bold" fill="#FFD700" opacity="0.8" transform="rotate(5, 310, 450)">02</text>

    <!-- ==================== ZIPPER PULLS / DETAILS ==================== -->
    <!-- Jacket zipper teeth left -->
    <path d="M215 285 L213 300 L212 320 L210 340 L209 360 L208 380 L207 400 L206 420 L205 440 L204 460" stroke="#888" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
    <!-- Jacket zipper teeth right -->
    <path d="M280 285 L282 300 L283 320 L285 340 L286 360 L287 380 L288 400 L289 420 L290 440 L291 460" stroke="#888" stroke-width="1" fill="none" stroke-dasharray="3,3"/>

    <!-- Small star detail on jacket -->
    <polygon points="175,390 178,382 181,390 173,384 183,384" fill="#FFD700" stroke="#CCAA00" stroke-width="0.3"/>
    <polygon points="320,390 317,382 314,390 322,384 312,384" fill="#FFD700" stroke="#CCAA00" stroke-width="0.3"/>
  </g>

  <!-- ==================== TITLE / LABEL ==================== -->
  <text x="248" y="775" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle" letter-spacing="3">KAGAMINE LEN — STYLISH ENERGY</text>
  <text x="248" y="790" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#AAA" text-anchor="middle" letter-spacing="2">PROJECT DIVA</text>
</svg>
